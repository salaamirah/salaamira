<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salaamira</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/checkout.css">
    <link rel="icon" type="image/png" href="./assets/images/SALA-AMIRA.png">
</head>
<body>

<header></header>

<section class="logo"></section>

<main class="checkout-box">

    <div id="checkout-cart-summary"></div><br>
    <form id="checkout-form" action="https://formsubmit.co/salaamirah@gmail.com" method="post">
        <label for="name">Full Name:</label><br><br>
        <input type="text" id="name" name="name" required><br><br>
        
        <label for="email">Email:</label><br><br>
        <input type="email" id="email" name="email" required><br><br>
        
        <label for="address">Address:</label><br><br>
        <input type="text" id="address" name="address" required><br><br>

        <label for="city">City:</label><br><br>
        <input type="text" id="city" name="city" required><br><br>

        <label for="state">State:</label><br><br>
        <input type="text" id="state" name="state" required><br><br>

        <label for="zip">Zip Code:</label><br><br>
        <input type="text" id="zip" name="zip" required><br><br>
        
        <button class="btn" type="submit">Complete Purchase</button>
    </form>

</main><br><br>

<footer></footer>



    <script src="./assets/js/script.js"></script>
    <script src="https://kit.fontawesome.com/bce413e63f.js" crossorigin="anonymous"></script>
    <script src="./assets/js/checkout.js"></script>
    
</body>
</html>
